apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trajectory-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mission-planner-ui
                port:
                  number: 80
