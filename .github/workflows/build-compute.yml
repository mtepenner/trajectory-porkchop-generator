name: Build Compute Engine

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build solver
        working-directory: compute_engine
        run: go build ./cmd/solver

  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install and validate
        working-directory: api_gateway
        run: |
          pip install -r requirements.txt
          python -m py_compile app/main.py app/core/redis_cache.py \
            app/api/routes/porkchop.py app/api/routes/trajectory.py

  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build
        working-directory: mission_planner_ui
        run: npm ci && npm run build
